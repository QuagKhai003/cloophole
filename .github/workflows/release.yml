name: release

# Build the standalone exe on every push to main and publish it to a rolling
# "latest" release. install.ps1 downloads .../releases/latest/download/cloophole.exe,
# so a normal `git push` keeps the installer current — no version tags needed.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Stamp build id
        run: |
          $sha = "${{ github.sha }}".Substring(0,7)
          Set-Content -Path cloophole/_build.py -Value "BUILD = '$sha'" -Encoding utf8
          Get-Content cloophole/_build.py

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller

      - name: Install UPX (exe compression)
        run: choco install upx -y --no-progress

      - name: Build cloophole.exe
        working-directory: packaging
        run: python -m PyInstaller cloophole.spec --noconfirm

      - name: Report size
        run: |
          $s = (Get-Item packaging/dist/cloophole.exe).Length / 1MB
          Write-Host ("cloophole.exe = {0:N1} MB" -f $s)

      - name: Smoke-test the exe
        run: packaging/dist/cloophole.exe status

      - name: Publish rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: cloophole (latest)
          body: Auto-built from the latest commit on main.
          files: packaging/dist/cloophole.exe
          make_latest: true
